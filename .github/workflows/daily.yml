name: OAK kunlik scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutubxonalar o'rnatish
        run: pip install requests beautifulsoup4 psycopg2-binary python-dotenv

      - name: Scraper ishga tushirish
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_scraper.py
