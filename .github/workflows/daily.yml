name: OAK kunlik scraper
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutubxonalar o'rnatish
        run: pip install requests beautifulsoup4

      - name: Scraper ishga tushirish
        run: python scraper.py

      - name: Saytga yuborish
        env:
          SITE_API_URL: ${{ secrets.SITE_API_URL }}
          SITE_API_KEY: ${{ secrets.SITE_API_KEY }}
        run: python send_to_site.py

      # Chat retention — 3 kundan eski yozishmalarni global tozalash (idempotent).
      # Lazy tozalash send/GET da ham ishlaydi; bu esa jim suhbatlarni ham tozalaydi.
      - name: Eski yozishmalarni tozalash (3 kun)
        env:
          REMINDERS_API_KEY: ${{ secrets.REMINDERS_API_KEY }}
        run: |
          curl --fail-with-body -sS -X POST \
            -H "X-API-Key: ${REMINDERS_API_KEY}" \
            https://www.olimlar.uz/api/v1/messages/cleanup || true

      # Watermark (last_state.json) ni repo ga qaytaramiz — aks holda har run
      # bir xil eski holatdan boshlanib, e'lonlarni qayta-qayta yuborardi.
      # Faqat yuborish muvaffaqiyatli bo'lsa ishga tushadi (oldingi qadam xato
      # bersa, holat saqlanmaydi va keyingi run qayta urinadi).
      - name: Holatni saqlash (last_state.json)
        run: |
          if git diff --quiet -- last_state.json; then
            echo "last_state.json o'zgarmadi — commit shart emas."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add last_state.json
            git commit -m "chore: scraper watermark yangilandi [skip ci]"
            git push
          fi
