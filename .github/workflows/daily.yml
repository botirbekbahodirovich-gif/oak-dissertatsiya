name: OAK kunlik scraper

on:
  schedule:
    # Har kuni 06:00 Toshkent (UTC+5) = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    # Qo'lda ham ishga tushirish mumkin (test uchun)

jobs:
  scrape_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutubxonalar o'rnatish
        run: pip install -r requirements.txt

      - name: Scraper ishga tushirish
        run: python scraper.py

      - name: Saytga yuborish
        env:
          SITE_API_URL: ${{ secrets.SITE_API_URL }}
          SITE_API_KEY: ${{ secrets.SITE_API_KEY }}
        run: python send_to_site.py

      - name: last_state.json ni saqlash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_state.json
          git diff --cached --quiet || git commit -m "Update last_state $(date -u +%Y-%m-%d)"
          git push
