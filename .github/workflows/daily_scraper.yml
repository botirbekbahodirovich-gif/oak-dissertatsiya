name: Daily OAK Scraper

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 11:00 Tashkent (UTC+5)
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 psycopg2-binary python-dotenv

      - name: Run daily scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_scraper.py

      - name: Print result
        if: success()
        run: echo "Scraper finished successfully."
