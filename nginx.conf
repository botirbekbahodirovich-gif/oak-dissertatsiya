# Olimlar.uz — reverse proxy for the Gunicorn app behind Cloudflare.
# Recovers the visitor's real IP from Cloudflare and forwards it cleanly to the
# backend. Drop this file in as /etc/nginx/nginx.conf (standalone nginx
# container/host) or adapt the `server` block into conf.d/.

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Allow large uploads (CSV/Excel data, university galleries, etc.).
    client_max_body_size 250M;

    # ── Cloudflare: trust its edge IPs and read the real client IP ──
    # IPv4 ranges (https://www.cloudflare.com/ips-v4)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6 ranges (https://www.cloudflare.com/ips-v6)
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    # Use Cloudflare's header as the authoritative client IP.
    real_ip_header   CF-Connecting-IP;
    real_ip_recursive on;

    upstream olimlar_app {
        # Gunicorn container/service listening on :8000.
        server app:8000;
    }

    server {
        listen 80;
        server_name _;

        # Serve static assets directly for speed; fall back to the app.
        location /static/ {
            alias /app/static/;
            expires 7d;
            access_log off;
            try_files $uri @app;
        }

        location @app {
            proxy_pass http://olimlar_app;
        }

        location / {
            proxy_pass http://olimlar_app;
            proxy_http_version 1.1;

            # Pass the real client IP and original request context to the backend.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
            proxy_set_header CF-IPCountry      $http_cf_ipcountry;

            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }
    }
}
