<!doctype html>
<html lang="uz" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dissertatsiya profili</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background:#0f1114; color:#d3d9e6; }
    .card { background:#111217; border:1px solid rgba(255,255,255,0.04); border-radius:12px; }
    .field-label { color:#8899b4; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.6px; }
    .field-value { color:#e8eef8; font-size:1rem; }
    a.btn-back { color:#9fbdfd; text-decoration:none; }
  </style>
</head>
<body>
  <div class="container py-4">
    <a href="/dashboard" class="btn-back mb-3">&larr; Ortga</a>
    <div class="card p-4">
      <h3 style="margin-bottom:0.4rem;">Dissertatsiya ma'lumotlari</h3>
      <div style="color:#8899b4;font-size:0.9rem;margin-bottom:1rem;">ID: {{ id }}</div>
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <div class="field-label">Sana</div>
          <div class="field-value">{{ row.Sana }}</div>
        </div>
        <div class="col-12 col-md-6">
          <div class="field-label">Daraja</div>
          <div class="field-value">{{ row.Daraja }}</div>
        </div>
        <div class="col-12">
          <div class="field-label">Olim</div>
          <div class="field-value">{{ row.Olim }}</div>
        </div>
        <div class="col-12">
          <div class="field-label">Mavzu</div>
          <div class="field-value">{{ row.Mavzu }}</div>
        </div>
        <div class="col-12 col-md-6">
          <div class="field-label">Ixtisoslik</div>
          <div class="field-value">{{ row.Ixtisoslik }}</div>
        </div>
        <div class="col-12 col-md-6">
          <div class="field-label">Muassasa</div>
          <div class="field-value">{{ row.Muassasa }}</div>
        </div>
        <div class="col-12">
          <div class="field-label">Ilmiy rahbar</div>
          <div class="field-value">{{ row.Ilmiy_rahbar }}</div>
        </div>
        <div class="col-12">
          <div class="field-label">Havola</div>
          <div class="field-value">{% if row.Link %}<a href="{{ row.Link }}" target="_blank" rel="noopener noreferrer">{{ row.Link }}</a>{% else %}—{% endif %}</div>
        </div>
      </div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
