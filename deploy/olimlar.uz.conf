# Nginx reverse proxy for Olimlar.uz -> Gunicorn.
# Installed by deploy.sh as /etc/nginx/sites-available/olimlar.uz (symlinked into
# sites-enabled). certbot rewrites this file to add the :443 TLS server block and
# an HTTP->HTTPS redirect. The __PLACEHOLDERS__ are substituted by deploy.sh.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    # Allow large uploads (CSV/Excel data imports).
    client_max_body_size 250M;

    # Serve static assets directly for speed.
    location /static/ {
        alias __APP_DIR__/static/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://__BIND__;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
